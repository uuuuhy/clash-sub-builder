name: publish
on: [push]
jobs:
    run:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v3
            - uses: denoland/setup-deno@v2
              with:
                  deno-version: "2.1.3"
              env:
                  GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
                  GIST_ID: ${{ secrets.GIST_ID }}
            - run: deno install && deno task start
